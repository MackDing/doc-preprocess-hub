name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check services/ sdk/ benchmarks/

  test-orchestrator:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dph
          POSTGRES_PASSWORD: dph_dev_password
          POSTGRES_DB: dph
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install orchestrator
        run: |
          cd services/orchestrator
          pip install -e ".[dev]"
      - name: Init DB
        run: psql -h localhost -U dph -d dph -f schema/001_init.sql
        env:
          PGPASSWORD: dph_dev_password
      - name: Test
        run: |
          cd services/orchestrator
          pytest -v
        env:
          DATABASE_URL: postgresql+psycopg://dph:dph_dev_password@localhost:5432/dph
          CELERY_BROKER_URL: memory://
          CELERY_RESULT_BACKEND: cache+memory://

  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK
        run: |
          cd sdk/python
          pip install -e ".[dev]"
      - name: Test
        run: |
          cd sdk/python
          pytest -v || echo "No tests yet"
